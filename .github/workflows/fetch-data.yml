name: Daily Real Estate Data Fetch

on:
  schedule:
    # Run at 09:00 UTC daily (17:00 Shanghai time)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Fetch today's data
        run: node scripts/fetch_data.js

      - name: Export to JSON
        run: node scripts/export_json.js

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: daily data update $(date +%Y-%m-%d)"
          git push
